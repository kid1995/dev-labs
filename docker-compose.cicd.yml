# CI/CD Tooling Stack — Gitea, Jenkins, Registry
# Usage:
#   docker compose -f docker-compose.cicd.yml up -d                    # core CI/CD only
#   docker compose -f docker-compose.cicd.yml --profile si-ui up -d    # + Storybook + Lab Guide
#
# Network: shares "lab-net" with docker-compose.apps.yml

services:
  # [LAB SIMULATION] Git server:
  #   Original: Bitbucket DC at git.system.local (requires license, 3GB+ RAM)
  #   Lab:      Gitea — lightweight, no license, 50MB RAM, same git push/pull workflow
  gitea:
    image: gitea/gitea:1.22
    container_name: lab-gitea
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__SSH_PORT: 2222
      GITEA__security__INSTALL_LOCK: "true"
    volumes:
      - gitea-data:/data
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # [LAB SIMULATION] CI/CD:
  #   Original: Jenkins with si-dp-shared-libs + elpa-shared-lib, connected to Bitbucket DC
  #   Lab:      Jenkins LTS with setup wizard disabled, Docker socket mounted for image builds
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: lab-jenkins
    ports:
      - "8888:8080"
      - "50000:50000"
    user: root
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # [LAB] Jenkins shared libraries mounted as local filesystem libs
      - ./jenkin/si-jenkin-lab:/var/jenkins_home/shared-libs/si-jenkin-lab:ro
      - ./jenkin/elpa-jenkin-lab:/var/jenkins_home/shared-libs/elpa-jenkin-lab:ro
      # Jenkins init script to register shared libraries on startup
      - ./config/jenkins/init-shared-libs.groovy:/var/jenkins_home/init.groovy.d/init-shared-libs.groovy:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # [LAB SIMULATION] Docker registry:
  #   Original: dev.docker.system.local + prod.docker.system.local (Nexus-hosted)
  #   Lab:      plain Docker Registry v2 (~10MB RAM)
  #   Push:     docker tag myimg localhost:5050/myimg && docker push localhost:5050/myimg
  #   From host: localhost:5050   From containers/k8s: registry:5000
  registry:
    image: registry:2
    container_name: lab-registry
    ports:
      - "5050:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/v2/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Optional: SI UI (profile: si-ui) ====================
  # These require local assets from src/design-system and docs/lab-guide.
  # Only available on machines with the full source checkout.

  # Lab Guide — documentation site
  lab-guide:
    image: nginx:1-alpine
    container_name: lab-guide
    profiles: ["si-ui"]
    ports:
      - "4202:80"
    volumes:
      - ./docs/lab-guide:/usr/share/nginx/html:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # [LAB] Signal Iduna Design System Storybook
  storybook:
    image: nginx:1-alpine
    container_name: lab-storybook
    profiles: ["si-ui"]
    ports:
      - "4201:80"
    volumes:
      - ./src/design-system/dist/storybook/storybook-host:/usr/share/nginx/html:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  gitea-data:
  jenkins-data:
  registry-data:

networks:
  lab-net:
    name: lab-net
