# Local DevOps Lab - Infrastructure Services
# Usage: cd dev-labs && docker compose up -d

services:
  # ==================== Tooling ====================

  # [LAB SIMULATION] Git server:
  #   Original: Bitbucket DC at git.system.local (requires license, 3GB+ RAM)
  #   Lab:      Gitea — lightweight, no license, 50MB RAM, same git push/pull workflow
  gitea:
    image: gitea/gitea:1.22
    container_name: lab-gitea
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__SSH_PORT: 2222
      GITEA__security__INSTALL_LOCK: "true"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # [LAB SIMULATION] CI/CD:
  #   Original: Jenkins with si-dp-shared-libs + elpa-shared-lib, connected to Bitbucket DC
  #   Lab:      Jenkins LTS with setup wizard disabled, Docker socket mounted for image builds
  #   Note:     docker.io CLI installed manually inside container (apt-get install docker.io)
  #             mavenLocal deps (jwt-adapter, elpa4-model) copied to /root/.m2/ inside container
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: lab-jenkins
    ports:
      - "8888:8080"
      - "50000:50000"
    user: root
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Lab Guide — documentation site for this DevOps lab
  lab-guide:
    image: nginx:1-alpine
    container_name: lab-guide
    ports:
      - "4202:80"
    volumes:
      - ./docs/lab-guide:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # [LAB] Signal Iduna Design System Storybook
  #   Built from libs/storybook-host in the design-system workspace
  #   Source: http://localhost:3000/lab/design-system
  storybook:
    image: nginx:1-alpine
    container_name: lab-storybook
    ports:
      - "4201:80"
    volumes:
      - ./src/design-system/dist/storybook/storybook-host:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Infrastructure ====================

  # [LAB SIMULATION] Database:
  #   Original: managed PostgreSQL at vipsiae11t.system-a.local (TST) / vipsiae11p.system-a.local (PRD)
  #   Lab:      single PostgreSQL container with both databases (hint + dltmanager)
  #   Credentials: hardcoded db_user/db_password (production uses Vault/K8s secrets)
  postgres:
    image: postgres:15-alpine
    container_name: lab-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: db_user       # [LAB SIMULATION] Production: from Kubernetes secret
      POSTGRES_PASSWORD: db_password # [LAB SIMULATION] Production: from Kubernetes secret
      POSTGRES_DB: postgresql
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # [LAB SIMULATION] Message broker:
  #   Original: multi-node Kafka cluster at bootstrap-nop.kafka.svc.cluster.local:9443
  #             with SASL_PLAINTEXT auth + OAUTHBEARER mechanism
  #   Lab:      single-node KRaft Kafka with PLAINTEXT (no auth)
  #   Topics auto-created, single partition, replication factor 1
  kafka:
    image: apache/kafka:3.7.0
    container_name: lab-kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1   # [LAB SIMULATION] Production: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # [LAB SIMULATION] Identity provider:
  #   Original: corporate OIDC at https://employee.login.int.signal-iduna.org/
  #   Lab:      Keycloak in dev mode with pre-imported "lab" realm
  #   Users:    admin/admin (sub=S000325), testuser/test (sub=U116330)
  #   Client:   8d12476c2684592b12515daab4ca0ddb72007118-E (same ID as production)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lab-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./config/keycloak/lab-realm.json:/opt/keycloak/data/import/lab-realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==================== Applications ====================

  # [LAB SIMULATION] hint-backend:
  #   Original image: dev.docker.system.local/elpa-hint-tst/hint:<commitId>.<buildNr>
  #   Lab image:      lab/hint-backend:latest (built from eclipse-temurin:21-jre-alpine)
  #   Original deployment: OpenShift DeploymentConfig via si_openshift.deployApplication()
  #   Lab deployment:      Docker container with env vars
  hint-backend:
    image: lab/hint-backend:latest
    container_name: lab-hint-backend
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres          # [LAB SIMULATION] Production: vipsiae11t.system-a.local
      POSTGRES_PORT: 5432
      POSTGRES_DB_NAME: hint           # [LAB SIMULATION] Production: elpapgt
      POSTGRES_SCHEMA_NAME: hint       # [LAB SIMULATION] Production TST: hin_<branch>, PRD: hint
      POSTGRES_USER: db_user           # [LAB SIMULATION] Production: from K8s secret postgres-secret
      POSTGRES_PASSWORD: db_password   # [LAB SIMULATION] Production: from K8s secret postgres-secret
      KAFKA_BROKERS: kafka:9092        # [LAB SIMULATION] Production: bootstrap-nop.kafka.svc.cluster.local:9443
      KAFKA_CONSUMER_GROUP: kafka-elpa-hint
      KAFKA_PROTOCOL: PLAINTEXT        # [LAB SIMULATION] Production: SASL_PLAINTEXT
      KAFKA_JAAS_ENABLED: "false"      # [LAB SIMULATION] Production: true (OAUTHBEARER)
      AUTH_URL: http://keycloak:8080/realms/lab/  # [LAB SIMULATION] Production: https://employee.login.int.signal-iduna.org/
      AUTH_USERS: admin                # [LAB SIMULATION] Production: S000325 (TST), S000374 (PRD)
      SWAGGER_ENABLED: "true"          # [LAB SIMULATION] Production: false
      FLYWAY_ENABLED: "true"
      FLYWAY_ROLE: db_user             # [LAB SIMULATION] Production: elpapg_role_hint_admin
      SERVICE_NAME: hint-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # [LAB SIMULATION] dlt-backend: same pattern as hint-backend above
  dlt-backend:
    image: lab/dlt-backend:latest
    container_name: lab-dlt-backend
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      POSTGRES_HOST: postgres          # [LAB SIMULATION] Production: vipsiae11t.system-a.local
      POSTGRES_PORT: 5432
      POSTGRES_DB_NAME: dltmanager
      POSTGRES_SCHEMA_NAME: dlt_manager
      POSTGRES_USER: db_user           # [LAB SIMULATION] Production: from K8s secret
      POSTGRES_PASSWORD: db_password   # [LAB SIMULATION] Production: from K8s secret
      KAFKA_BROKER: kafka:9092         # [LAB SIMULATION] Production: bootstrap-nop.kafka.svc.cluster.local:9443
      KAFKA_CONSUMER_GROUP: dlt-manager-consumer
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT  # [LAB SIMULATION] Production: SASL_PLAINTEXT
      KAFKA_JAAS_ENABLED: "false"         # [LAB SIMULATION] Production: true
      AUTH_URL: http://keycloak:8080/realms/lab/  # [LAB SIMULATION] Production: https://employee.login.int.signal-iduna.org/
      AUTH_USERS: admin                # [LAB SIMULATION] Production: S000325,S000759,U116330,...
      SWAGGER_ENABLED: "true"          # [LAB SIMULATION] Production: false
      FLYWAY_ENABLED: "true"
      FLYWAY_ROLE: db_user             # [LAB SIMULATION] Production: elpapg_role_hint_admin
      SERVICE_NAME: dlt-manager
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # [LAB SIMULATION] dlt-frontend:
  #   Original image: dev.docker.system.local/elpa-dltmanager-tst/dltmanager-ui:<hash>.<buildNr>
  #   Lab image:      lab/dlt-frontend:latest (nginx:1-alpine with SPA routing)
  #   Runtime URL substitution replaces hardcoded production OIDC URL in compiled JS
  dlt-frontend:
    image: lab/dlt-frontend:latest
    container_name: lab-dlt-frontend
    ports:
      - "4200:80"
    environment:
      BACKEND_URL: http://localhost:8082      # [LAB SIMULATION] Production: set by si_openshift via BASE_ROUTE_URL
      AUTH_URL: http://localhost:8180/realms/lab  # [LAB SIMULATION] Production: https://employee.login.int.signal-iduna.org/
    depends_on:
      - dlt-backend

  # ==================== Reverse Proxy ====================
  # Routes *.labs.local hostnames to the correct container
  # Requires /etc/hosts entries — run: ./scripts/setup-dns.sh
  proxy:
    image: nginx:1-alpine
    container_name: lab-proxy
    ports:
      - "80:80"
    volumes:
      - ./config/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  gitea-data:
  jenkins-data:
