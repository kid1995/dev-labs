---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dlt-frontend-config
  namespace: apps-dev
data:
  BACKEND_URL: "http://dlt-backend:8080"
  AUTH_URL: "http://keycloak:8080/realms/lab/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlt-frontend
  namespace: apps-dev
  labels:
    app: dlt-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlt-frontend
  template:
    metadata:
      labels:
        app: dlt-frontend
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: dlt-frontend
          image: lab/dlt-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: dlt-frontend-config
                  key: BACKEND_URL
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: dlt-frontend-config
                  key: AUTH_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dlt-frontend
  namespace: apps-dev
spec:
  selector:
    app: dlt-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
