apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hint-tst
  namespace: argocd
spec:
  project: default
  source:
    # CoPSI deploy repo in Gitea — where Jenkins pushes rendered Helm manifests
    repoURL: http://gitea:3000/labadmin/elpa-elpa4.git
    targetRevision: nop
    path: services/hint
    directory:
      recurse: false
      exclude: '{kustomization.yaml,features/**}'
  destination:
    server: https://kubernetes.default.svc
    namespace: elpa-elpa4
  ignoreDifferences:
    - group: networking.istio.io
      kind: VirtualService
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
