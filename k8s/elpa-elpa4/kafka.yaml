# Kafka KRaft in elpa-elpa4 namespace
# Simulates: bootstrap-nop.kafka.svc.cluster.local:9443
# Lab:       kafka.elpa-elpa4.svc.cluster.local:9092 (PLAINTEXT, no auth)
#
# Topics are created by an init Job — add new topics there.
# In production, topics are managed via kafka/values.yaml in the deploy repo
# and provisioned by the kafka-urp Helm chart.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: elpa-elpa4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.elpa-elpa4.svc.cluster.local:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: "2"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: elpa-elpa4
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
  type: ClusterIP
---
# Also expose as bootstrap-nop.kafka to match corporate DNS pattern
# Services can use either kafka:9092 or bootstrap-nop:9092
apiVersion: v1
kind: Service
metadata:
  name: bootstrap-nop
  namespace: elpa-elpa4
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    # Also listen on 9443 to match corporate port (same PLAINTEXT, just different port)
    - name: corporate-port
      port: 9443
      targetPort: 9092
  type: ClusterIP
---
# Topic init Job — add topics from kafka/values.yaml here
# Mirrors the topics defined in elpa-elpa4 deploy repo kafka/values.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: elpa-elpa4
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done']
      containers:
        - name: topic-creator
          image: apache/kafka:3.7.0
          command:
            - /bin/bash
            - -c
            - |
              # Topics from kafka/values.yaml in deploy repo
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic elpa-hint-created-tst --partitions 2 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic elpa-hint-created-dev --partitions 2 --replication-factor 1
              # DLT topics
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic elpa-hint-created-tst.DLT --partitions 1 --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic elpa-hint-created-dev.DLT --partitions 1 --replication-factor 1
              echo "=== Topics created ==="
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
